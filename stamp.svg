<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stampGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A5C2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064520;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="60" cy="40" r="35" fill="url(#stampGrad)" stroke="#E8A735" stroke-width="2"/>

  <!-- Inner decorative border -->
  <circle cx="60" cy="40" r="30" fill="none" stroke="#E8A735" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Company name -->
  <text x="60" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">AGRIGRO</text>
  <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">INDIA</text>

  <!-- Seal text -->
  <text x="60" y="50" text-anchor="middle" fill="#E8A735" font-family="Arial, sans-serif" font-size="6" font-weight="bold">AUTHORIZED</text>
  <text x="60" y="58" text-anchor="middle" fill="#E8A735" font-family="Arial, sans-serif" font-size="6" font-weight="bold">DEALER</text>

  <!-- Date placeholder -->
  <text x="60" y="68" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="5">2025</text>
</svg>